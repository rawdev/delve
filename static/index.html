<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Delve</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0; padding: 16px;
    background: #0d0f12; color: #c8ccd4;
    font-family: "Consolas", "D2Coding", "Courier New", monospace;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  #map { font-size: 15px; line-height: 1.0; letter-spacing: 1px; white-space: pre; margin: 0; }
  .dark  { color: #2f3540; }               /* explored, 지금은 안 보임 */
  .wall  { color: #6b7382; }
  .floor { color: #454c58; }
  .stair { color: #e8c46a; font-weight: bold; }
  .you   { color: #7ee081; font-weight: bold; }
  .enemy { color: #e06c75; font-weight: bold; }
  #hud { display: flex; gap: 18px; font-size: 14px; flex-wrap: wrap; justify-content: center; }
  #hud b { color: #e8e8ea; }
  #log { height: 8.4em; overflow: hidden; font-size: 13px; color: #8b93a1;
         width: min(100%, 64ch); }
  #log div:last-child { color: #c8ccd4; }
  #banner { font-size: 18px; font-weight: bold; min-height: 1.2em; }
  .dead { color: #e06c75; } .won { color: #7ee081; }
  footer { font-size: 12px; color: #565e6b; text-align: center; }
  a { color: #7aa2f7; }
</style>
</head>
<body>

<h1 style="font-size:16px;letter-spacing:3px;margin:0;color:#8b93a1">D E L V E</h1>

<div id="hud">
  <span>층 <b id="floor">-</b></span>
  <span>HP <b id="hp">-</b></span>
  <span>Lv <b id="lv">-</b></span>
  <span>XP <b id="xp">-</b></span>
  <span>턴 <b id="turn">-</b></span>
  <span>시드 <b id="seed">-</b></span>
</div>

<pre id="map">불러오는 중…</pre>

<div id="banner"></div>
<div id="log"></div>

<footer>
  이동 <b>방향키</b> / <b>hjkl</b>(+<b>yubn</b> 대각) &nbsp;·&nbsp; 대기 <b>.</b>
  &nbsp;·&nbsp; 계단 <b>&gt;</b> &nbsp;·&nbsp; 새 게임 <b>r</b><br>
  적이 있는 칸으로 이동하면 공격합니다. 죽으면 처음부터 (permadeath).<br>
  <span style="color:#454c58">이 게임의 개발 과정은 전부 공개 메모리로 남습니다.</span>
</footer>

<script>
const DIRS = {
  ArrowUp: "north", ArrowDown: "south", ArrowLeft: "west", ArrowRight: "east",
  k: "north", j: "south", h: "west", l: "east",
  y: "northwest", u: "northeast", b: "southwest", n: "southeast",
};

let game = null;
let busy = false;

async function post(url, body) {
  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body ?? {}),
  });
  if (res.status === 409) return null;          // 성립하지 않는 행동 — 턴 소비 없음
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function newGame() {
  game = await post("/api/game", {});
  render();
}

async function act(action) {
  if (busy || !game || game.status !== "playing") return;
  busy = true;
  try {
    const next = await post(`/api/game/${game.game_id}/action`, action);
    if (next) { game = next; render(); }        // null이면 무효 행동 — 화면 그대로
  } finally {
    busy = false;
  }
}

function render() {
  const g = game;
  floor.textContent = g.floor;
  hp.textContent = `${g.player.hp}/${g.player.max_hp}`;
  lv.textContent = g.level;
  xp.textContent = `${g.xp}/${g.xp_needed}`;
  turn.textContent = g.turn;
  seed.textContent = g.seed;

  // 액터를 타일 위에 얹는다 (서버는 보이는 적만 보낸다)
  const grid = g.tiles.map(row => row.split(""));
  for (const a of g.actors) grid[a.y][a.x] = a.glyph;
  grid[g.player.y][g.player.x] = "@";

  const enemyGlyphs = new Set(g.actors.map(a => a.glyph));

  let html = "";
  for (let y = 0; y < g.height; y++) {
    for (let x = 0; x < g.width; x++) {
      const ch = grid[y][x];
      const visible = g.lit[y][x] === "1";
      html += `<span class="${cls(ch, visible, enemyGlyphs)}">${esc(ch)}</span>`;
    }
    html += "\n";
  }
  map.innerHTML = html;

  log.innerHTML = g.log.map(line => `<div>${esc(line)}</div>`).join("");

  banner.className = g.status === "dead" ? "dead" : g.status === "won" ? "won" : "";
  banner.textContent =
    g.status === "dead" ? "당신은 죽었다.  [r] 새 게임"
    : g.status === "won" ? "던전을 빠져나왔다!  [r] 새 게임"
    : "";
}

function cls(ch, visible, enemyGlyphs) {
  if (ch === "@") return "you";
  if (!visible) return "dark";                  // 기억 — 적은 여기 안 그려진다
  if (enemyGlyphs.has(ch)) return "enemy";
  if (ch === "#") return "wall";
  if (ch === ">") return "stair";
  if (ch === ".") return "floor";
  return "";
}

const esc = s => s.replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));

addEventListener("keydown", e => {
  if (e.key === "r") { newGame(); return; }
  if (e.key in DIRS) { e.preventDefault(); act({ type: "move", dir: DIRS[e.key] }); return; }
  if (e.key === ".") { act({ type: "wait" }); return; }
  if (e.key === ">") { act({ type: "descend" }); return; }
});

newGame();
</script>
</body>
</html>
